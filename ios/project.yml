name: memo

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ANR8BQYXA9
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    IPHONEOS_DEPLOYMENT_TARGET: 18.0
    TARGETED_DEVICE_FAMILY: "1,2"

settingGroups:
  appBase:
    PRODUCT_NAME: memo
    PRODUCT_BUNDLE_IDENTIFIER: memo.cc
    INFOPLIST_FILE: App/Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    SWIFT_EMIT_LOC_STRINGS: YES

packages:
  Msplat:
    path: ../msplat/swift
  MetalSplatter:
    path: ../MetalSplatter

targets:
  memo:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    settings:
      groups:
        - appBase
      base:
        PRODUCT_MODULE_NAME: memo
        SUPPORTS_MACCATALYST: NO
    sources:
      - path: App
    dependencies:
      - package: Msplat
        product: Msplat
      - package: MetalSplatter
        product: MetalSplatter
      - package: MetalSplatter
        product: SplatIO
